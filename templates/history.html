<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Prediction History</title>
</head>
<body>
    <h1>Your Prediction History</h1>
    {% if logs %}
        <table border="1" cellpadding="5" cellspacing="0">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Input Type</th>
                    <th>Input Data</th>
                    <th>Prediction Result</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.created_at.strftime("%Y-%m-%d %H:%M:%S") }}</td>
                    <td>{{ log.input_type }}</td>
                    <td><pre>{{ log.input_data }}</pre></td>
                    <td><pre>{{ log.prediction_result }}</pre></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No prediction history found.</p>
    {% endif %}
</body>
</html>
