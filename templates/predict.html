<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Single Transaction Prediction</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        max-width: 500px;
        margin: 40px auto;
        padding: 20px;
        background: #f9f9f9;
        border-radius: 8px;
        box-shadow: 0 0 10px #ccc;
        font-family: Arial, sans-serif;
      }
      .result-box {
        margin-top: 30px;
        padding: 15px;
        font-weight: bold;
        font-size: 18px;
        border-radius: 6px;
      }
    </style>
</head>
<body>

  <h2 class="mb-4 text-center">SINGLE UPI TRANSACTION</h2>
  <form method="POST" action="{{ url_for('predict_page') }}">
    <div class="mb-3">
      <label for="Amount" class="form-label">Transaction Amount</label>
      <input type="number" class="form-control" name="Amount" required step="0.01" />
    </div>
    <div class="mb-3">
      <label for="TransactionType" class="form-label">Transaction Type</label>
      <select class="form-select" name="TransactionType" required>
        <option value="p2p">Peer to Peer (p2p)</option>
        <option value="p2m">Peer to Merchant (p2m)</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="FailedAttempts" class="form-label">Failed Attempts</label>
      <input type="number" class="form-control" name="FailedAttempts" required />
    </div>
    <button type="submit" class="btn btn-primary w-100">Predict</button>
  </form>

  <!-- Prediction Result -->
  {% if prediction is not none %}
  <div class="result-box alert mt-4
      {% if prediction == 1 %}
          alert-danger
      {% else %}
          alert-success
      {% endif %}
  ">
    {% if prediction == 1 %}
      🚨 <strong>Alert:</strong> This transaction is likely <strong>fraudulent</strong>.
    {% else %}
      ✅ <strong>Safe:</strong> This transaction appears <strong>legitimate</strong>.
    {% endif %}
  </div>
  {% endif %}
<div class="text-center mt-4">
  <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Back to Dashboard</a>
</div>
</body>
</html>
